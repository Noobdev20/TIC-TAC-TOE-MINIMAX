<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <p class="instructions">You are X. AI is O. Enter your move as <code>row col</code>.</p>
        <div class="input-row">
            <input id="moveInput" type="text" placeholder="0 2" aria-label="Enter row and column" />
            <button id="submitMove">Submit</button>
        </div>
        <div id="board" class="board"></div>
        <div class="status-row">
            <div id="status" class="status">Your turn</div>
            <button id="restartButton">Restart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
